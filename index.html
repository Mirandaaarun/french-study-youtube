<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1015">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="French Study">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<title>French Study — Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1015;
    --panel: #141a22;
    --panel-2: #1a212b;
    --border: #232b37;
    --text: #e6edf3;
    --muted: #8b96a4;
    --dim: #5c6675;
    --accent: #f5a524;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    font: 15px/1.5 "Inter", system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    padding: 28px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 {
    font-family: "Source Serif 4", serif; font-style: italic;
    margin: 0 0 4px 0; font-size: 26px; letter-spacing: 0;
  }
  header .tag { color: var(--muted); font-size: 13px; }
  header .accent { color: var(--accent); }

  main { padding: 20px 24px 60px; max-width: 1100px; margin: 0 auto; }
  .progress {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin-bottom: 18px;
  }
  .metric {
    border: 1px solid var(--border); border-radius: 8px; background: var(--panel);
    padding: 12px;
  }
  .metric strong { display: block; color: var(--accent); font-size: 22px; line-height: 1; }
  .metric span { display: block; color: var(--muted); font-size: 12px; margin-top: 5px; }
  .quick-actions {
    display: grid; gap: 10px; margin-bottom: 18px;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  }
  .action {
    border: 1px solid var(--border); border-radius: 8px; padding: 13px;
    background: var(--panel); color: var(--text); text-align: left;
    cursor: pointer; font: inherit; text-decoration: none;
  }
  .action:hover { border-color: var(--accent); }
  .action strong { display: block; font-size: 14px; margin-bottom: 3px; }
  .action span { display: block; color: var(--muted); font-size: 12px; }
  .tools {
    display: grid; gap: 12px; margin-bottom: 18px;
  }
  .search {
    width: 100%; border: 1px solid var(--border); background: var(--panel);
    color: var(--text); border-radius: 8px; padding: 11px 12px;
    font: inherit; outline: none;
  }
  .search:focus { border-color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid var(--border); background: var(--panel);
    color: var(--muted); border-radius: 8px; padding: 7px 10px;
    font: inherit; font-size: 13px; cursor: pointer;
  }
  .chip.active {
    color: #111820; background: var(--accent); border-color: var(--accent);
  }
  .paths {
    display: grid; gap: 10px; margin: 0 0 18px;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  }
  .path {
    border: 1px solid var(--border); border-radius: 8px; padding: 12px;
    background: var(--panel); cursor: pointer; text-align: left; color: var(--text);
    font: inherit;
  }
  .path strong { display: block; font-size: 14px; margin-bottom: 2px; }
  .path span { color: var(--muted); font-size: 12px; }
  .path.active { border-color: var(--accent); }
  .grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; text-decoration: none;
    color: var(--text); transition: transform 0.12s, border-color 0.12s;
    display: flex; flex-direction: column;
  }
  .card:hover {
    transform: translateY(-2px); border-color: var(--accent);
  }
  .thumb {
    aspect-ratio: 16 / 9; background: #000; position: relative;
    overflow: hidden;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.7));
  }
  .thumb .duration {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.85); color: #fff; padding: 2px 6px;
    border-radius: 3px; font-size: 11px; font-variant-numeric: tabular-nums;
  }
  .badges {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .badge {
    border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px;
    color: var(--muted); font-size: 11px;
  }
  .badge.level { color: var(--accent); border-color: rgba(245, 165, 36, 0.45); }
  .meta { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .title {
    font-family: "Source Serif 4", serif; font-weight: 500; font-size: 16px;
    line-height: 1.3; color: var(--text);
  }
  .author { color: var(--muted); font-size: 13px; }
  .stats {
    margin-top: auto; color: var(--dim); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .stats span:not(:last-child)::after {
    content: "·"; margin-left: 10px; color: var(--border);
  }

  .empty {
    text-align: center; padding: 80px 20px; color: var(--muted);
    font-style: italic;
  }
  .review {
    display: none; border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel); margin-bottom: 18px; overflow: hidden;
  }
  .review.show { display: block; }
  .review-head {
    display: flex; justify-content: space-between; gap: 12px;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
  }
  .review-title { font-weight: 600; color: var(--text); }
  .review-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .review-close {
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    border-radius: 7px; padding: 6px 9px; cursor: pointer;
  }
  .hard-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 10px; padding: 12px;
  }
  .hard-card {
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel-2); padding: 12px;
  }
  .hard-fr {
    font-family: "Source Serif 4", serif; color: var(--accent);
    font-size: 17px; margin-bottom: 4px;
  }
  .hard-en { color: var(--text); font-size: 13px; }
  .hard-video { color: var(--dim); font-size: 11px; margin-top: 8px; }
  .hard-actions { margin-top: 10px; display: flex; gap: 6px; }
  .hard-actions a {
    color: #111820; background: var(--accent); border-radius: 6px;
    padding: 6px 8px; text-decoration: none; font-size: 12px; font-weight: 600;
  }
  .empty .hint { font-size: 13px; margin-top: 14px; color: var(--dim); }
  .empty code {
    background: var(--panel); padding: 3px 8px; border-radius: 4px;
    color: var(--accent); font-size: 12px;
  }

  @media (max-width: 600px) {
    header { padding: 20px 16px 14px; }
    header h1 { font-size: 22px; }
    main { padding: 16px 14px 40px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
  }
</style>
</head>
<body>
<header>
  <h1>French Study <span class="accent">·</span> Library</h1>
  <div class="tag" id="count">Loading…</div>
</header>
<main>
  <div class="progress" id="progress"></div>
  <div class="quick-actions" id="quick-actions"></div>
  <div class="review" id="hard-review"></div>
  <div class="tools">
    <input class="search" id="search" type="search" placeholder="Search videos, themes, creators…" autocomplete="off">
    <div class="chips" id="levels"></div>
    <div class="chips" id="themes"></div>
  </div>
  <div class="paths" id="paths"></div>
  <div id="grid" class="grid"></div>
</main>

<script>
let allVideos = [];
let activeLevel = "all";
let activeTheme = "all";
let activePath = "all";
let query = "";
let dailyVideo = null;

async function init() {
  try {
    const r = await fetch("videos.json", { cache: "no-store" });
    if (r.ok) allVideos = await r.json();
  } catch (e) {
    console.log("[landing] videos.json missing or unreadable:", e);
  }

  const grid = document.getElementById("grid");
  const count = document.getElementById("count");

  if (!allVideos.length) {
    count.textContent = "No videos yet";
    grid.innerHTML = `
      <div class="empty">
        <div>No study sites here yet.</div>
        <div class="hint">Build one with the <code>french-youtube-site</code> skill.</div>
      </div>
    `;
    return;
  }

  // Sort newest lesson-first when note metadata is available.
  allVideos.sort((a, b) =>
    (b.lesson_date || b.added || "").localeCompare(a.lesson_date || a.added || "")
  );
  dailyVideo = pickDailyVideo();
  bindControls();
  renderProgress();
  renderQuickActions();
  render();
}

function getGlobalProgress() {
  try {
    return JSON.parse(localStorage.getItem("fr-study:global") || "{}");
  } catch {
    return {};
  }
}

function getVideoProgress(id) {
  try {
    return JSON.parse(localStorage.getItem("fr-study:" + id) || "{}");
  } catch {
    return {};
  }
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function streakCount(studied) {
  let count = 0;
  const d = new Date();
  while (true) {
    const key = d.toISOString().slice(0, 10);
    if (!studied || !studied[key]) break;
    count++;
    d.setDate(d.getDate() - 1);
  }
  return count;
}

function renderProgress() {
  const p = getGlobalProgress();
  const completed = Object.keys(p.completed || {}).length;
  const streak = streakCount(p.studied || {});
  const xp = Number(p.xp || 0);
  const hard = countHardWords();
  document.getElementById("progress").innerHTML = `
    <div class="metric"><strong>${xp}</strong><span>XP</span></div>
    <div class="metric"><strong>${streak}</strong><span>day streak</span></div>
    <div class="metric"><strong>${completed}</strong><span>sessions done</span></div>
    <div class="metric"><strong>${hard}</strong><span>hard words</span></div>
  `;
}

function countHardWords() {
  let total = 0;
  for (const v of allVideos) {
    const status = getVideoProgress(v.id).vocabStatus || {};
    total += Object.values(status).filter(x => x === "hard").length;
  }
  return total;
}

function pickDailyVideo() {
  const pool = allVideos.filter(v =>
    (v.visibility || "public") === "public" &&
    ((v.study_paths || []).includes("Start Here: A1") || String(v.level || "").includes("A2"))
  );
  const candidates = pool.length ? pool : allVideos;
  if (!candidates.length) return null;
  const seed = todayKey().replaceAll("-", "");
  const idx = Number(seed) % candidates.length;
  return candidates[idx];
}

function renderQuickActions() {
  const root = document.getElementById("quick-actions");
  const latest = allVideos[0];
  const a1Path = allVideos.find(v => (v.study_paths || []).includes("Start Here: A1"));
  const questions = allVideos.find(v => (v.themes || []).includes("questions"));
  root.innerHTML = "";
  if (dailyVideo) root.appendChild(actionLink("Daily challenge", dailyVideo.title || dailyVideo.id, `${dailyVideo.id}/?tab=session`));
  if (latest) root.appendChild(actionLink("Continue latest", latest.title || latest.id, `${latest.id}/`));
  if (a1Path) root.appendChild(actionButton("Start Here: A1", "Show beginner-friendly lessons", () => {
    activePath = "Start Here: A1"; activeLevel = "all"; activeTheme = "all"; query = "";
    document.getElementById("search").value = "";
    bindControls(); render();
  }));
  if (questions) root.appendChild(actionButton("Practice questions", "Filter question-form lessons", () => {
    activeTheme = "questions"; activePath = "all"; activeLevel = "all"; query = "";
    document.getElementById("search").value = "";
    bindControls(); render();
  }));
  root.appendChild(actionButton("Friend mode", "Show public A1/A2-friendly lessons", () => {
    activeLevel = "A1-A2"; activeTheme = "all"; activePath = "all"; query = "";
    document.getElementById("search").value = "";
    bindControls(); render();
  }));
  root.appendChild(actionButton("Review hard words", "Practice words marked Hard", () => {
    renderHardReview();
  }));
}

async function renderHardReview() {
  const panel = document.getElementById("hard-review");
  panel.classList.add("show");
  panel.innerHTML = `
    <div class="review-head">
      <div>
        <div class="review-title">Hard words review</div>
        <div class="review-sub">Loading words marked Hard in this browser…</div>
      </div>
      <button class="review-close" type="button">Close</button>
    </div>
    <div class="hard-grid"></div>
  `;
  panel.querySelector(".review-close").addEventListener("click", () => panel.classList.remove("show"));
  const words = [];
  for (const video of allVideos) {
    const status = getVideoProgress(video.id).vocabStatus || {};
    const hard = new Set(Object.entries(status).filter(([, s]) => s === "hard").map(([fr]) => fr));
    if (!hard.size) continue;
    try {
      const r = await fetch(`${video.id}/data.json`, { cache: "no-store" });
      if (!r.ok) continue;
      const data = await r.json();
      for (const item of data.vocab || []) {
        if (hard.has(item.fr)) words.push({ ...item, video });
      }
    } catch {}
  }
  const sub = panel.querySelector(".review-sub");
  const grid = panel.querySelector(".hard-grid");
  sub.textContent = words.length ? `${words.length} hard word${words.length === 1 ? "" : "s"}` : "No hard words yet. Mark words as Hard inside a video.";
  grid.innerHTML = words.slice(0, 30).map(w => `
    <div class="hard-card">
      <div class="hard-fr">${escapeHtml(w.fr)}</div>
      <div class="hard-en">${escapeHtml(w.en || "")}</div>
      ${w.zh ? `<div class="hard-en">${escapeHtml(w.zh)}</div>` : ""}
      <div class="hard-video">${escapeHtml(w.video.title || w.video.id)}</div>
      <div class="hard-actions"><a href="${escapeAttr(w.video.id)}/?tab=vocabulary">Open video</a></div>
    </div>
  `).join("");
  renderProgress();
}

function actionLink(title, sub, href) {
  const a = document.createElement("a");
  a.className = "action";
  a.href = href;
  a.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(sub)}</span>`;
  return a;
}

function actionButton(title, sub, onClick) {
  const b = document.createElement("button");
  b.className = "action";
  b.type = "button";
  b.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(sub)}</span>`;
  b.addEventListener("click", onClick);
  return b;
}

function bindControls() {
  document.getElementById("search").oninput = e => {
    query = e.target.value.trim().toLowerCase();
    render();
  };
  renderChips("levels", ["all", ...unique(allVideos.map(v => v.level).filter(Boolean))], activeLevel, value => {
    activeLevel = value;
    render();
  });
  renderChips("themes", ["all", ...unique(allVideos.flatMap(v => v.themes || []))], activeTheme, value => {
    activeTheme = value;
    render();
  });
  renderPaths();
}

function render() {
  const grid = document.getElementById("grid");
  const count = document.getElementById("count");
  const videos = allVideos.filter(matchesFilters);
  count.textContent = `${videos.length} of ${allVideos.length} video${allVideos.length === 1 ? "" : "s"}`;
  grid.innerHTML = "";

  for (const v of videos) {
    const card = document.createElement("a");
    card.className = "card";
    card.href = `${v.id}/`;
    const badges = [
      v.level ? `<span class="badge level">${escapeHtml(v.level)}</span>` : "",
      ...(v.themes || []).slice(0, 3).map(t => `<span class="badge">${escapeHtml(t)}</span>`),
    ].join("");
    card.innerHTML = `
      <div class="thumb">
        <img src="https://i.ytimg.com/vi/${escapeAttr(v.id)}/mqdefault.jpg" alt="" loading="lazy">
        <div class="overlay"></div>
        ${v.duration ? `<div class="duration">${escapeHtml(v.duration)}</div>` : ""}
      </div>
      <div class="meta">
        ${badges ? `<div class="badges">${badges}</div>` : ""}
        <div class="title">${escapeHtml(v.title || v.id)}</div>
        ${v.author ? `<div class="author">${escapeHtml(v.author)}</div>` : ""}
        <div class="stats">
          ${v.vocab != null ? `<span>${v.vocab} vocab</span>` : ""}
          ${v.sentences != null ? `<span>${v.sentences} sentences</span>` : ""}
          ${v.added ? `<span>${v.added}</span>` : ""}
        </div>
      </div>
    `;
    grid.appendChild(card);
  }
}

function matchesFilters(v) {
  if (activeLevel !== "all" && v.level !== activeLevel) return false;
  if (activeTheme !== "all" && !(v.themes || []).includes(activeTheme)) return false;
  if (activePath !== "all" && !(v.study_paths || []).includes(activePath)) return false;
  if (!query) return true;
  const haystack = [
    v.title, v.author, v.level,
    ...(v.themes || []),
    ...(v.study_paths || []),
  ].join(" ").toLowerCase();
  return haystack.includes(query);
}

function renderChips(id, values, active, onClick) {
  const el = document.getElementById(id);
  el.innerHTML = "";
  for (const value of values) {
    const btn = document.createElement("button");
    btn.className = "chip" + (value === active ? " active" : "");
    btn.type = "button";
    btn.textContent = value === "all" ? (id === "levels" ? "All levels" : "All themes") : value;
    btn.addEventListener("click", () => {
      onClick(value);
      bindControls();
    });
    el.appendChild(btn);
  }
}

function renderPaths() {
  const el = document.getElementById("paths");
  const paths = unique(allVideos.flatMap(v => v.study_paths || []));
  el.innerHTML = "";
  for (const path of paths.slice(0, 6)) {
    const count = allVideos.filter(v => (v.study_paths || []).includes(path)).length;
    const btn = document.createElement("button");
    btn.className = "path" + (path === activePath ? " active" : "");
    btn.type = "button";
    btn.innerHTML = `<strong>${escapeHtml(path)}</strong><span>${count} video${count === 1 ? "" : "s"}</span>`;
    btn.addEventListener("click", () => {
      activePath = activePath === path ? "all" : path;
      renderPaths();
      render();
    });
    el.appendChild(btn);
  }
}

function unique(items) {
  return [...new Set(items)].sort((a, b) => String(a).localeCompare(String(b)));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
  })[c]);
}
function escapeAttr(s) { return encodeURIComponent(s); }

init();

// Service worker (offline support)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
